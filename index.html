<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple card hover effect demo">
  <link rel="stylesheet" href="style.css">
  <title>Card Hover Effect</title>
</head>
<body>
  <main class="cards">
    <div class="card">
      <img src="assets/1.jpg" alt="Sarah">
      <div class="description">
        <h3>Sarah</h3>
        <p>Software Engineer</p>
      </div>
    </div>

    <div class="card">
      <img src="assets/2.jpg" alt="Alice">
      <div class="description">
        <h3>Alice</h3>
        <p>Data Analyst</p>
      </div>
    </div>

    <div class="card">
      <img src="assets/3.jpg" alt="John">
      <div class="description">
        <h3>John</h3>
        <p>Product Manager</p>
      </div>
    </div>

    <div class="card">
      <img src="assets/4.jpg" alt="Arman">
      <div class="description">
        <h3>Arman</h3>
        <p>Designer</p>
      </div>
    </div>

    <div class="card">
      <img src="assets/5.jpg" alt="Ayat">
      <div class="description">
        <h3>Ayat</h3>
        <p>Web Developer</p>
      </div>
    </div>
  </main>
</body>
</html>
